<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サーナイト スキル＆げんきカウンター V7.2</title>
    <style>
        :root {
            --primary-color: #68d391;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 16px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.2rem;
            text-align: center;
            margin-top: 0;
            margin-bottom: 16px;
            color: #4a5568;
        }
        .section-title {
            font-size: 0.95rem;
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 8px;
            border-left: 4px solid var(--primary-color);
            padding-left: 6px;
        }
        .config-section {
            background: #edf2f7;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }
        .config-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .config-row:last-child { margin-bottom: 0; }
        select, input[type="number"] {
            padding: 4px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            background: white;
            font-size: 0.85rem;
            max-width: 250px;
        }
        .checkbox-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .stat-box {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
        }
        .stat-box.highlight {
            grid-column: span 2;
            background: #ebf8ff;
            border-color: #bee3f8;
        }
        .stat-box.energy-box {
            grid-column: span 2;
            background: #fffaf0;
            border-color: #feebc8;
        }
        .stat-val {
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 4px;
        }
        .stat-val.plus { color: #38a169; }
        .stat-val.minus { color: #e53e3e; }
        .stat-val.energy { color: #dd6b20; }
        
        .trigger-btn {
            width: 100%;
            height: 70px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(104, 211, 145, 0.4);
            transition: transform 0.1s;
            margin-bottom: 12px;
        }
        .trigger-btn:active { transform: scale(0.98); }
        
        .control-btns {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .control-btns button {
            flex: 1;
            padding: 8px;
            border: 1px solid #cbd5e0;
            background: white;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .log-section {
            border-top: 1px solid #e2e8f0;
            padding-top: 12px;
        }
        .log-list {
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.8rem;
            color: #4a5568;
            padding-left: 20px;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>サーナイト カウンター V7.2</h1>
    
    <div class="section-title">個体・環境設定</div>
    <div class="config-section">
        <div class="config-row">
            <label>現在のレベル:</label>
            <input type="number" id="pokemon-lvl" value="70" min="1" max="100" style="width: 60px;" onchange="updateCalculations()">
        </div>
        <div class="config-row">
            <label>性格:</label>
            <select id="nature" onchange="updateCalculations()">
                <option value="がんばりや" data-speed="0.0" data-skill="1.0" data-energy="1.0">がんばりや（無補正）</option>
                <option value="すなお" data-speed="0.0" data-skill="1.0" data-energy="1.0">すなお（無補正）</option>
                <option value="てれや" data-speed="0.0" data-skill="1.0" data-energy="1.0">てれや（無補正）</option>
                <option value="きまぐれ" data-speed="0.0" data-skill="1.0" data-energy="1.0">きまぐれ（無補正）</option>
                <option value="まじめ" data-speed="0.0" data-skill="1.0" data-energy="1.0">まじめ（無補正）</option>
                <option value="さみしがり" data-speed="-0.1" data-skill="1.0" data-energy="0.8" selected>さみしがり（おてつだいスピードUP・げんき回復量DOWN）</option>
                <option value="いじっぱり" data-speed="-0.1" data-skill="1.0" data-energy="1.0">いじっぱり（おてつだいスピードUP・食材おてつだい確率DOWN）</option>
                <option value="やんちゃ" data-speed="-0.1" data-skill="0.8" data-energy="1.0">やんちゃ（おてつだいスピードUP・メインスキル発生確率DOWN）</option>
                <option value="ゆうかん" data-speed="-0.1" data-skill="1.0" data-energy="1.0">ゆうかん（おてつだいスピードUP・EXP獲得量DOWN）</option>
                <option value="ずぶとい" data-speed="0.1" data-skill="1.0" data-energy="1.2">ずぶとい（げんき回復量UP・おてつだいスピードDOWN）</option>
                <option value="わんぱく" data-speed="0.0" data-skill="1.0" data-energy="1.2">わんぱく（げんき回復量UP・食材おてつだい確率DOWN）</option>
                <option value="のうてんき" data-speed="0.0" data-skill="0.8" data-energy="1.2">のうてんき（げんき回復量UP・メインスキル発生確率DOWN）</option>
                <option value="のんき" data-speed="0.0" data-skill="1.0" data-energy="1.2">のんき（げんき回復量UP・EXP獲得量DOWN）</option>
                <option value="ひかえめ" data-speed="0.1" data-skill="1.0" data-energy="1.0">ひかえめ（食材おてつだい確率UP・おてつだいスピードDOWN）</option>
                <option value="おっとり" data-speed="0.0" data-skill="1.0" data-energy="0.8">おっとり（食材おてつだい確率UP・げんき回復量DOWN）</option>
                <option value="うっかりや" data-speed="0.0" data-skill="0.8" data-energy="1.0">うっかりや（食材おてつだい確率UP・メインスキル発生確率DOWN）</option>
                <option value="れいせい" data-speed="0.0" data-skill="1.0" data-energy="1.0">れいせい（食材おてつだい確率UP・EXP獲得量DOWN）</option>
                <option value="おだやか" data-speed="0.1" data-skill="1.2" data-energy="1.0">おだやか（メインスキル発生確率UP・おてつだいスピードDOWN）</option>
                <option value="おとなしい" data-speed="0.0" data-skill="1.2" data-energy="0.8">おとなしい（メインスキル発生確率UP・げんき回復量DOWN）</option>
                <option value="しんちょう" data-speed="0.0" data-skill="1.2" data-energy="1.0">しんちょう（メインスキル発生確率UP・食材おてつだい確率DOWN）</option>
                <option value="なまいき" data-speed="0.0" data-skill="1.2" data-energy="1.0">なまいき（メインスキル発生確率UP・EXP獲得量DOWN）</option>
                <option value="おくびょう" data-speed="0.1" data-skill="1.0" data-energy="1.0">おくびょう（EXP獲得量UP・おてつだいスピードDOWN）</option>
                <option value="せっかち" data-speed="0.0" data-skill="1.0" data-energy="0.8">せっかち（EXP獲得量UP・げんき回復量DOWN）</option>
                <option value="ようき" data-speed="0.0" data-skill="1.0" data-energy="1.0">ようき（EXP獲得量UP・食材おてつだい確率DOWN）</option>
                <option value="むじゃき" data-speed="0.0" data-skill="0.8" data-energy="1.0">むじゃき（EXP獲得量UP・メインスキル発生確率DOWN）</option>
            </select>
        </div>
        <div class="config-row">
            <label>サブスキル(確率):</label>
            <div class="checkbox-group">
                <label><input type="checkbox" id="sub-prob-m" checked onchange="updateCalculations()">確率M</label>
                <label><input type="checkbox" id="sub-prob-s" checked onchange="updateCalculations()">確率S</label>
            </div>
        </div>
        <div class="config-row">
            <label>サブスキル(スピード):</label>
            <div class="checkbox-group">
                <label><input type="checkbox" id="sub-speed-m" checked onchange="updateCalculations()">スピM</label>
                <label><input type="checkbox" id="sub-speed-s" onchange="updateCalculations()">スピS</label>
            </div>
        </div>
        <div class="config-row">
            <label>チームのおてつだいボーナス:</label>
            <select id="team-otomo" onchange="updateCalculations()">
                <option value="0" selected>なし (0枚)</option>
                <option value="1">1枚 (5%)</option>
                <option value="2">2枚 (10%)</option>
                <option value="3">3枚 (15%)</option>
                <option value="4">4枚 (20%)</option>
                <option value="5">5枚 (25%)</option>
            </select>
        </div>
        <div class="config-row">
            <label>スキルレベル (回復量用):</label>
            <select id="skill-lv" onchange="updateCalculations()">
                <option value="1">Lv1 (5)</option>
                <option value="2">Lv2 (7)</option>
                <option value="3">Lv3 (9)</option>
                <option value="4">Lv4 (11)</option>
                <option value="5">Lv5 (15)</option>
                <option value="6" selected>Lv6 (18)</option>
            </select>
        </div>
        <div class="config-row">
            <label>フィールド環境:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" id="camp-ticket" onchange="updateCalculations()">いいキャンプチケ</label>
            </div>
        </div>
        <div class="config-row">
            <label>EX好物:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" id="ex-fav-minus" onchange="toggleExFav('minus')">－10％</label>
                <label><input type="checkbox" id="ex-fav-plus" onchange="toggleExFav('plus')">＋10％</label>
            </div>
        </div>
        <div class="config-row">
            <label>EXバフ:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" id="event-skill-buff" onchange="updateCalculations()">メインスキル発生確率 1.25倍</label>
            </div>
        </div>
        
        <div style="border-top: 1px dashed #cbd5e0; padding-top: 8px;
